<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARCONT Logo Refinement</title>
    <style>
      body {
        margin: 0;
        font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(180deg, #f8fbfe 0%, #e9f0f7 100%);
        color: #10213a;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 42px 24px 60px;
      }
      h1 {
        margin: 0;
        font-size: 42px;
      }
      p {
        margin: 12px 0 0;
        color: #58677d;
        font-size: 18px;
      }
      .card {
        margin-top: 28px;
        padding: 20px;
        border-radius: 28px;
        background: rgba(255,255,255,0.92);
        border: 1px solid rgba(148,163,184,0.2);
        box-shadow: 0 20px 44px rgba(15,23,42,0.08);
      }
      img {
        width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>ARCONT • Refinamiento limpio</h1>
      <p>Version mas cercana a la referencia: icono mas equilibrado, tipografia mas fuerte y slogan mas fino y ordenado.</p>
      <div class="card">
        <img src="../svg/arcont-22-enterprise-clean.svg" alt="ARCONT enterprise clean" />
      </div>
    </main>
  </body>
</html>
