services:
  postgres:
    image: postgres:16-alpine
    container_name: arcont-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arcont
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - arcont_postgres_data:/var/lib/postgresql/data

volumes:
  arcont_postgres_data:
